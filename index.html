<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>CoderIn ♥ — Enter</title>
  <meta name="description" content="Student practical exam helper. Enter password to access Python and Android practicals." />
  <link rel="stylesheet" href="style.css" />
</head>
<body class="login-body">

  <!-- NAVBAR -->
  <nav class="navbar">
    <div class="logo">CoderIn<span class="heart">♥</span></div>
    <button class="hamburger" id="hamburger" onclick="toggleNav()" aria-label="Toggle menu">
      <span></span><span></span><span></span>
    </button>
    <div class="nav-links" id="navLinks">
      <button class="icon-btn" id="darkToggle" onclick="toggleDark()" title="Toggle theme">☀️</button>
    </div>
  </nav>

  <!-- HERO -->
  <main class="login-main">

    <!-- Left: Text + Form -->
    <div class="login-left">
      <h1 class="chill-text">Chill Kar Jaani...</h1>
      <p class="sub-chill">Naa le <span>❤️</span> par Jaani</p>

      <div class="login-form">
        <input
          type="password"
          id="passwordInput"
          class="pass-input"
          placeholder="Enter password..."
          autocomplete="current-password"
        />
        <button class="enter-btn" onclick="checkPassword()">Enter</button>
      </div>
      <p class="login-hint">🔒 Restricted Access — Students Only</p>
    </div>

    <!-- Right: Bear SVG Mascot -->
    <div class="login-right">
      <svg viewBox="0 0 200 215" xmlns="http://www.w3.org/2000/svg" class="bear-svg" aria-label="Cool bear mascot with sunglasses">
        <!-- Ears -->
        <circle cx="52" cy="76" r="29" fill="#c8956c"/>
        <circle cx="52" cy="76" r="17" fill="#af7845"/>
        <circle cx="148" cy="76" r="29" fill="#c8956c"/>
        <circle cx="148" cy="76" r="17" fill="#af7845"/>
        <!-- Head -->
        <ellipse cx="100" cy="122" rx="72" ry="70" fill="#d4a574"/>
        <!-- Snout -->
        <ellipse cx="100" cy="153" rx="30" ry="21" fill="#c49060"/>
        <!-- Nose -->
        <ellipse cx="100" cy="143" rx="9" ry="6" fill="#3a1f08"/>
        <!-- Mouth -->
        <path d="M 90 154 Q 100 164 110 154" stroke="#3a1f08" stroke-width="2.8" fill="none" stroke-linecap="round"/>
        <!-- Sunglasses left -->
        <rect x="56" y="98" width="40" height="27" rx="11" fill="#0f0f0f"/>
        <!-- Sunglasses right -->
        <rect x="104" y="98" width="40" height="27" rx="11" fill="#0f0f0f"/>
        <!-- Bridge -->
        <rect x="96" y="109" width="8" height="4" rx="2" fill="#0f0f0f"/>
        <!-- Arms -->
        <line x1="56" y1="112" x2="36" y2="112" stroke="#0f0f0f" stroke-width="5" stroke-linecap="round"/>
        <line x1="144" y1="112" x2="164" y2="112" stroke="#0f0f0f" stroke-width="5" stroke-linecap="round"/>
        <!-- Lens shine -->
        <ellipse cx="70" cy="107" rx="6" ry="5" fill="#fff" opacity="0.12"/>
        <ellipse cx="120" cy="107" rx="6" ry="5" fill="#fff" opacity="0.12"/>
      </svg>
    </div>

  </main>

  <script src="script.js"></script>
</body>
</html>
